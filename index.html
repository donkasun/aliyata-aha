<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EyeDrop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game-canvas" width="1024" height="640"></canvas>
  <div id="music-controls">
    <button id="btn-prev" type="button">⏮</button>
    <button id="btn-play" type="button">▶</button>
    <button id="btn-next" type="button">⏭</button>
    <input id="vol-slider" type="range" min="0" max="100" value="20" />
    <span id="track-name"></span>
  </div>
  <video id="hand-feed" style="display:none" playsinline></video>

  <!-- MediaPipe loaded as classic scripts (exposes window.Hands, window.Camera).
       Must come before the ES module so globals are available when game.js runs. -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script type="module" src="src/game.js"></script>
</body>
</html>
